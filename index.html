<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>记忆胶囊 - 随身记忆助手</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { font-family: 'Noto Sans SC', sans-serif; -webkit-tap-highlight-color: transparent; box-sizing: border-box; margin: 0; padding: 0; }
        html, body { background: #0f0f1e; color: white; min-height: 100vh; overflow-x: hidden; }
        body { background: linear-gradient(180deg, #1a1a2e 0%, #16213e 100%); background-attachment: fixed; padding-bottom: 80px; -webkit-overflow-scrolling: touch; }
        .gpu-accelerated { transform: translateZ(0); will-change: transform; backface-visibility: hidden; }
        .glass-card { background: rgba(255, 255, 255, 0.06); border: 1px solid rgba(255, 255, 255, 0.12); border-radius: 16px; }
        .input-glass { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 10px; transition: border-color 0.2s; }
        .input-glass:focus { border-color: rgba(99, 102, 241, 0.8); outline: none; }
        .bottom-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(15, 15, 30, 0.98); border-top: 1px solid rgba(255, 255, 255, 0.08); padding-bottom: env(safe-area-inset-bottom); z-index: 50; }
        .memory-item { margin-bottom: 12px; }
        .quick-modal { position: fixed; inset: 0; background: #0f0f1e; z-index: 100; display: none; }
        .quick-modal.active { display: flex; flex-direction: column; }
        .config-modal { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.9); z-index: 200; display: none; align-items: center; justify-content: center; padding: 20px; }
        .config-modal.active { display: flex; }
        .scroll-container { overflow-y: auto; -webkit-overflow-scrolling: touch; overscroll-behavior: contain; }
        .tag-item { background: rgba(99, 102, 241, 0.25); border: 1px solid rgba(99, 102, 241, 0.4); border-radius: 20px; padding: 4px 12px; font-size: 12px; }
        .mini-map { height: 100px; border-radius: 8px; overflow: hidden; margin-top: 8px; background: rgba(0,0,0,0.2); }
        .mini-map.loading::before { content: '地图加载中...'; display: flex; align-items: center; justify-content: center; height: 100%; color: rgba(255,255,255,0.4); font-size: 12px; }
        .loading-dots { display: flex; gap: 4px; justify-content: center; padding: 20px; }
        .loading-dots span { width: 8px; height: 8px; background: rgba(255,255,255,0.5); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out both; }
        .loading-dots span:nth-child(1) { animation-delay: -0.32s; }
        .loading-dots span:nth-child(2) { animation-delay: -0.16s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
        .connection-status { width: 8px; height: 8px; border-radius: 50%; display: inline-block; margin-right: 6px; }
        .connection-status.online { background: #10b981; box-shadow: 0 0 6px #10b981; }
        .connection-status.offline { background: #ef4444; box-shadow: 0 0 6px #ef4444; }
        .toast-message { position: fixed; top: 80px; left: 50%; transform: translateX(-50%); background: rgba(99, 102, 241, 0.95); color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px; z-index: 300; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        .load-more { text-align: center; padding: 20px; color: rgba(255,255,255,0.5); font-size: 14px; }
        .load-more-btn { background: rgba(255,255,255,0.1); border: 1px solid rgba(255,255,255,0.2); padding: 8px 20px; border-radius: 20px; color: white; }
        .view-container { display: none; }
        .view-container.active { display: block; }
        #mapView { position: fixed; top: 70px; left: 0; right: 0; bottom: 70px; z-index: 10; }
        #fullMap { height: 100%; width: 100%; }
        .stat-card { background: linear-gradient(135deg, rgba(99, 102, 241, 0.15), rgba(139, 92, 246, 0.1)); border: 1px solid rgba(99, 102, 241, 0.3); border-radius: 16px; padding: 20px; }
        .stat-number { font-size: 36px; font-weight: 700; background: linear-gradient(135deg, #818cf8, #c084fc); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .leaflet-popup-content-wrapper { background: rgba(26, 26, 46, 0.95); color: white; border-radius: 12px; border: 1px solid rgba(255,255,255,0.1); }
        .leaflet-popup-tip { background: rgba(26, 26, 46, 0.95); }
        .memory-popup { min-width: 200px; max-width: 250px; }
        .memory-popup h4 { font-size: 14px; font-weight: 600; margin-bottom: 6px; color: #818cf8; }
        .memory-popup p { font-size: 12px; color: rgba(255,255,255,0.8); line-height: 1.4; }
        .memory-popup .time { font-size: 11px; color: rgba(255,255,255,0.5); margin-top: 4px; }
        .progress-bar { height: 8px; background: rgba(255,255,255,0.1); border-radius: 4px; overflow: hidden; }
        .progress-fill { height: 100%; background: linear-gradient(90deg, #6366f1, #8b5cf6); border-radius: 4px; transition: width 0.5s ease; }
        .date-group-label { position: relative; margin-bottom: 12px; padding: 8px 0; }
        .image-upload-area { border: 2px dashed rgba(255,255,255,0.2); border-radius: 12px; padding: 20px; text-align: center; cursor: pointer; transition: all 0.2s; }
        .image-upload-area:active { border-color: #6366f1; background: rgba(99, 102, 241, 0.1); }
        .image-preview { max-height: 150px; border-radius: 8px; margin-top: 10px; }
    </style>
</head>
<body>
    <header class="sticky top-0 z-40 gpu-accelerated" style="background: rgba(26,26,46,0.98); border-bottom: 1px solid rgba(255,255,255,0.08);">
        <div class="px-4 py-3 flex items-center justify-between">
            <div class="flex items-center gap-3">
                <div class="w-9 h-9 rounded-full bg-gradient-to-br from-indigo-500 to-purple-600 flex items-center justify-center">
                    <i data-lucide="brain" class="w-5 h-5"></i>
                </div>
                <div>
                    <h1 class="text-base font-bold">记忆胶囊</h1>
                    <p class="text-xs text-white/50" id="header-stats">0 段记忆</p>
                </div>
            </div>
            <div class="flex items-center gap-2">
                <button onclick="refreshData()" class="w-9 h-9 rounded-full bg-white/10 flex items-center justify-center active:scale-95" title="刷新">
                    <i data-lucide="refresh-cw" class="w-4 h-4 text-white/70"></i>
                </button>
                <button onclick="openConfig()" class="w-9 h-9 rounded-full bg-white/10 flex items-center justify-center active:scale-95">
                    <i data-lucide="settings" class="w-4 h-4 text-white/70"></i>
                </button>
                <button onclick="openQuickAdd()" class="w-9 h-9 rounded-full bg-indigo-500 flex items-center justify-center active:scale-95">
                    <i data-lucide="plus" class="w-5 h-5"></i>
                </button>
            </div>
        </div>
        <div id="listFilterBar" class="px-4 pb-3 flex gap-2 overflow-x-auto hide-scrollbar">
            <button onclick="filterMemories('all')" class="filter-btn active px-3 py-1.5 rounded-full bg-white/20 text-sm whitespace-nowrap border border-white/20" data-filter="all">全部</button>
            <button onclick="filterMemories('today')" class="filter-btn px-3 py-1.5 rounded-full bg-white/5 text-sm whitespace-nowrap border border-white/10 text-white/70" data-filter="today">今天</button>
            <button onclick="filterMemories('week')" class="filter-btn px-3 py-1.5 rounded-full bg-white/5 text-sm whitespace-nowrap border border-white/10 text-white/70" data-filter="week">7天</button>
            <button onclick="filterMemories('travel')" class="filter-btn px-3 py-1.5 rounded-full bg-white/5 text-sm whitespace-nowrap border border-white/10 text-white/70" data-filter="travel">旅行</button>
            <button onclick="filterMemories('work')" class="filter-btn px-3 py-1.5 rounded-full bg-white/5 text-sm whitespace-nowrap border border-white/10 text-white/70" data-filter="work">工作</button>
        </div>
    </header>

    <div id="connectionBar" class="px-4 py-2 bg-red-500/20 text-center hidden">
        <span class="connection-status offline"></span>
        <span class="text-xs text-red-300">未连接到服务器</span>
    </div>

    <div id="listView" class="view-container active">
        <main class="px-3 py-3 scroll-container" id="mainContainer">
            <div id="memoriesList"></div>
            <div id="loadMoreContainer" class="load-more hidden">
                <button onclick="loadMore()" class="load-more-btn">加载更多</button>
            </div>
            <div id="emptyState" class="hidden flex flex-col items-center justify-center py-16 text-white/40">
                <i data-lucide="compass" class="w-14 h-14 mb-3 opacity-30"></i>
                <p class="text-sm">点击右上角 + 开始记录</p>
            </div>
        </main>
    </div>

    <div id="mapView" class="view-container">
        <div id="fullMap"></div>
        <div class="absolute top-4 right-4 z-[1000] flex flex-col gap-2">
            <button onclick="fitMapBounds()" class="w-10 h-10 rounded-full bg-indigo-500 flex items-center justify-center shadow-lg">
                <i data-lucide="maximize-2" class="w-5 h-5"></i>
            </button>
            <button onclick="centerOnUser()" class="w-10 h-10 rounded-full bg-white/10 backdrop-blur flex items-center justify-center shadow-lg border border-white/20">
                <i data-lucide="crosshair" class="w-5 h-5"></i>
            </button>
        </div>
        <div class="absolute bottom-4 left-4 right-4 z-[1000]">
            <div class="glass-card p-3 flex items-center justify-between">
                <div class="text-center">
                    <div class="text-xl font-bold text-indigo-300" id="mapStatTotal">0</div>
                    <div class="text-[10px] text-white/50">总记忆</div>
                </div>
                <div class="text-center">
                    <div class="text-xl font-bold text-emerald-300" id="mapStatLocations">0</div>
                    <div class="text-[10px] text-white/50">有位置</div>
                </div>
                <div class="text-center">
                    <div class="text-xl font-bold text-amber-300" id="mapStatCities">0</div>
                    <div class="text-[10px] text-white/50">地点数</div>
                </div>
            </div>
        </div>
    </div>

    <div id="statsView" class="view-container">
        <main class="px-4 py-4 scroll-container" style="padding-bottom: 100px;">
            <div class="grid grid-cols-2 gap-3 mb-4">
                <div class="stat-card text-center">
                    <div class="stat-number" id="statTotal">0</div>
                    <div class="text-xs text-white/60 mt-1">记忆总数</div>
                </div>
                <div class="stat-card text-center">
                    <div class="stat-number" id="statLocations">0</div>
                    <div class="text-xs text-white/60 mt-1">记录地点</div>
                </div>
            </div>
            <div class="glass-card p-4 mb-4">
                <h3 class="text-sm font-semibold mb-3 flex items-center gap-2"><i data-lucide="bar-chart-2" class="w-4 h-4 text-indigo-400"></i>数据分布</h3>
                <div class="space-y-3">
                    <div class="flex items-center justify-between text-sm"><span class="text-white/60">带位置信息</span><span class="text-white font-medium" id="statWithLocation">0</span></div>
                    <div class="progress-bar"><div class="progress-fill" id="progressLocation" style="width: 0%"></div></div>
                    <div class="flex items-center justify-between text-sm"><span class="text-white/60">带图片</span><span class="text-white font-medium" id="statWithImage">0</span></div>
                    <div class="progress-bar"><div class="progress-fill" id="progressImage" style="width: 0%"></div></div>
                    <div class="flex items-center justify-between text-sm"><span class="text-white/60">带标签</span><span class="text-white font-medium" id="statWithTags">0</span></div>
                    <div class="progress-bar"><div class="progress-fill" id="progressTags" style="width: 0%"></div></div>
                </div>
            </div>
            <div class="glass-card p-4 mb-4">
                <h3 class="text-sm font-semibold mb-3 flex items-center gap-2"><i data-lucide="tag" class="w-4 h-4 text-indigo-400"></i>标签统计</h3>
                <div id="tagsList" class="space-y-2"><p class="text-xs text-white/40 text-center py-4">暂无标签数据</p></div>
            </div>
            <div class="glass-card p-4 mb-4">
                <h3 class="text-sm font-semibold mb-3 flex items-center gap-2"><i data-lucide="trending-up" class="w-4 h-4 text-indigo-400"></i>记录趋势</h3>
                <div class="h-48"><canvas id="trendChart"></canvas></div>
            </div>
            <div class="glass-card p-4">
                <h3 class="text-sm font-semibold mb-3 flex items-center gap-2"><i data-lucide="clock" class="w-4 h-4 text-indigo-400"></i>活跃时段</h3>
                <div class="grid grid-cols-4 gap-2 text-center">
                    <div class="p-2 rounded-lg bg-white/5"><div class="text-lg font-bold text-indigo-300" id="statMorning">0</div><div class="text-[10px] text-white/50">早晨</div></div>
                    <div class="p-2 rounded-lg bg-white/5"><div class="text-lg font-bold text-amber-300" id="statAfternoon">0</div><div class="text-[10px] text-white/50">下午</div></div>
                    <div class="p-2 rounded-lg bg-white/5"><div class="text-lg font-bold text-orange-300" id="statEvening">0</div><div class="text-[10px] text-white/50">晚上</div></div>
                    <div class="p-2 rounded-lg bg-white/5"><div class="text-lg font-bold text-purple-300" id="statNight">0</div><div class="text-[10px] text-white/50">深夜</div></div>
                </div>
            </div>
        </main>
    </div>

    <div id="quickModal" class="quick-modal">
        <div class="px-4 py-3 flex items-center justify-between border-b border-white/10" style="background: #1a1a2e;">
            <button onclick="closeQuickAdd()" class="p-2 -ml-2 text-white/70"><i data-lucide="x" class="w-6 h-6"></i></button>
            <h2 class="text-lg font-semibold">新记忆</h2>
            <button id="saveBtn" onclick="saveMemory()" class="px-4 py-1.5 bg-indigo-500 rounded-full text-sm font-medium">保存</button>
        </div>
        <div class="flex-1 overflow-y-auto hide-scrollbar p-4 space-y-4" style="background: #0f0f1e;">
            <div class="glass-card p-3 space-y-2">
                <div class="flex items-center justify-between">
                    <span class="text-sm font-medium text-indigo-300 flex items-center gap-2"><i data-lucide="sparkles" class="w-4 h-4"></i>智能填充</span>
                    <button onclick="autoFillAll()" class="text-xs px-3 py-1 bg-indigo-500/30 rounded-full">一键获取</button>
                </div>
                <div class="grid grid-cols-2 gap-2">
                    <button onclick="getCurrentLocation()" class="flex items-center gap-2 p-2.5 rounded-lg bg-white/5 text-left">
                        <i data-lucide="map-pin" class="w-4 h-4 text-red-400"></i>
                        <div class="flex-1 min-w-0"><div class="text-xs text-white/50">位置</div><div class="text-xs truncate" id="btn-location">点击获取</div></div>
                    </button>
                    <button onclick="setCurrentTime()" class="flex items-center gap-2 p-2.5 rounded-lg bg-white/5 text-left">
                        <i data-lucide="clock" class="w-4 h-4 text-blue-400"></i>
                        <div class="flex-1 min-w-0"><div class="text-xs text-white/50">时间</div><div class="text-xs truncate" id="btn-time">点击获取</div></div>
                    </button>
                </div>
            </div>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs text-white/50 mb-1">地点 <span class="text-red-400">*</span></label>
                    <input type="text" id="input-location" placeholder="例如：星巴克" class="input-glass w-full px-3 py-2 text-sm text-white placeholder-white/30">
                    <input type="hidden" id="input-lat"><input type="hidden" id="input-lng">
                </div>
                <div>
                    <label class="block text-xs text-white/50 mb-1">时间</label>
                    <input type="datetime-local" id="input-time" class="input-glass w-full px-3 text-sm text-white [color-scheme:dark] h-10 box-border">
                </div>
                <div>
                    <label class="block text-xs text-white/50 mb-2">标签</label>
                    <div class="flex flex-wrap gap-2" id="quickTags">
                        <button onclick="toggleTag(this, '旅行')" class="tag-item text-white/80">旅行</button>
                        <button onclick="toggleTag(this, '美食')" class="tag-item text-white/80">美食</button>
                        <button onclick="toggleTag(this, '工作')" class="tag-item text-white/80">工作</button>
                        <button onclick="toggleTag(this, '重要')" class="tag-item text-white/80">重要</button>
                    </div>
                    <input type="hidden" id="input-tags">
                </div>
                <div>
                    <label class="block text-xs text-white/50 mb-1">周边环境</label>
                    <textarea id="input-nearby" rows="2" placeholder="附近的商店、声音、天气..." class="input-glass w-full px-3 py-2 text-sm text-white placeholder-white/30 resize-none"></textarea>
                </div>
                <div>
                    <label class="block text-xs text-white/50 mb-1">详细记录 <span class="text-red-400">*</span></label>
                    <textarea id="input-content" rows="3" placeholder="发生了什么？" class="input-glass w-full px-3 py-2 text-sm text-white placeholder-white/30 resize-none"></textarea>
                </div>
                <div>
                    <label class="block text-xs text-white/50 mb-2">图片</label>
                    <div class="image-upload-area" id="uploadArea">
                        <i data-lucide="image-plus" class="w-8 h-8 mx-auto mb-2 text-white/40"></i>
                        <div class="text-xs text-white/50">点击上传图片</div>
                        <div class="text-[10px] text-white/30 mt-1">支持 JPG、PNG</div>
                    </div>
                    <input type="file" id="fileInput" accept="image/*" style="display:none">
                    <div id="imagePreviewContainer" class="hidden">
                        <img id="imagePreview" class="image-preview w-full object-cover">
                        <div class="flex gap-2 mt-2">
                            <button onclick="clearImage()" class="flex-1 py-1.5 text-xs bg-red-500/20 text-red-300 rounded-lg">删除图片</button>
                        </div>
                    </div>
                    <div class="mt-2 text-center"><span class="text-[10px] text-white/30">或</span></div>
                    <input type="url" id="input-image" placeholder="粘贴图片链接..." class="input-glass w-full px-3 py-2 text-sm text-white placeholder-white/30 mt-2">
                </div>
            </div>
        </div>
    </div>

    <div id="configModal" class="config-modal">
        <div class="glass-card p-5 w-full max-w-sm space-y-4">
            <div class="flex items-center justify-between">
                <h2 class="text-lg font-semibold flex items-center gap-2"><i data-lucide="server" class="w-5 h-5 text-indigo-400"></i>服务器配置</h2>
                <button onclick="closeConfig()" class="p-1 text-white/50"><i data-lucide="x" class="w-5 h-5"></i></button>
            </div>
            <div class="space-y-3">
                <div>
                    <label class="block text-xs text-white/50 mb-1">API 地址</label>
                    <input type="text" id="config-server-url" placeholder="https://...trycloudflare.com" class="input-glass w-full px-3 py-2 text-sm">
                </div>
                <div class="p-3 rounded-lg bg-white/5 border border-white/10">
                    <div class="flex items-center justify-between mb-1">
                        <span class="text-xs text-white/50">状态</span>
                        <span id="config-status" class="text-xs flex items-center"><span class="connection-status offline"></span>未连接</span>
                    </div>
                    <div class="text-xs text-white/30 break-all" id="config-current-url">默认</div>
                </div>
                <div class="flex gap-2">
                    <button onclick="testConnection()" class="flex-1 py-2 rounded-lg bg-white/10 text-sm">测试</button>
                    <button onclick="saveConfig()" class="flex-1 py-2 rounded-lg bg-indigo-500 text-sm">保存</button>
                </div>
                <button onclick="resetConfig()" class="w-full py-2 text-xs text-white/40">恢复默认</button>
            </div>
        </div>
    </div>

    <div class="bottom-bar px-6 py-3 flex justify-around">
        <button onclick="showView('list')" class="flex flex-col items-center gap-1 text-indigo-400" id="nav-list"><i data-lucide="list" class="w-5 h-5"></i><span class="text-[10px]">列表</span></button>
        <button onclick="showView('map')" class="flex flex-col items-center gap-1 text-white/50" id="nav-map"><i data-lucide="map" class="w-5 h-5"></i><span class="text-[10px]">地图</span></button>
        <button onclick="showView('stats')" class="flex flex-col items-center gap-1 text-white/50" id="nav-stats"><i data-lucide="pie-chart" class="w-5 h-5"></i><span class="text-[10px]">统计</span></button>
    </div>

    <script>
        const ITEMS_PER_PAGE = 20;
        let currentPage = 0, allMemories = [], displayedMemories = [], miniMapInstances = new Map();
        let fullMap = null, currentView = 'list', trendChart = null;
        let uploadedImageBase64 = null;
        
        function getApiBase() {
            const saved = localStorage.getItem('memory_capsule_server_url');
            return saved ? saved.replace(/\/$/, '') : window.location.origin;
        }
        
        let API_BASE = getApiBase(), currentFilter = 'all', selectedTags = [];

        document.addEventListener('DOMContentLoaded', () => {
            lucide.createIcons();
            checkConnection();
            loadMemories();
            initUploadArea();
            const fileInput = document.getElementById('fileInput');
            if (fileInput) {
                fileInput.addEventListener('change', handleFileSelect);
            }
        });

        async function checkConnection() {
            try {
                const ctrl = new AbortController();
                setTimeout(() => ctrl.abort(), 5000);
                const res = await fetch(`${API_BASE}/api/health`, { signal: ctrl.signal });
                const data = await res.json();
                showConnectionStatus(data.success);
                return data.success;
            } catch {
                showConnectionStatus(false);
                return false;
            }
        }

        function showConnectionStatus(connected) {
            document.getElementById('connectionBar').classList.toggle('hidden', connected);
        }

        async function loadMemories() {
            try {
                showLoading(true);
                const res = await fetch(`${API_BASE}/api/memories`);
                const data = await res.json();
                if (data.success) {
                    allMemories = data.data || [];
                    currentPage = 0;
                    renderPagedMemories();
                    updateMapStats();
                    renderStatsView();
                }
            } catch (err) {
                showToast('加载失败');
            } finally {
                showLoading(false);
            }
        }

        function renderPagedMemories() {

            displayedMemories = filtered.slice(0, end);

        function renderMemories(memoriesToRender) {
            const container = document.getElementById('memoriesList'), emptyState = document.getElementById('emptyState');
            if (memoriesToRender.length === 0) { container.innerHTML = ''; emptyState.classList.remove('hidden'); return; }
            emptyState.classList.add('hidden');

                const dateGroup = document.createElement('div');

        function setupLazyMaps() {
            if (!('IntersectionObserver' in window)) {
                document.querySelectorAll('.mini-map.loading').forEach(el => initMiniMap(el));
                return;
            }
            const observer = new IntersectionObserver((entries) => {
                entries.forEach(entry => { if (entry.isIntersecting) { initMiniMap(entry.target); observer.unobserve(entry.target); } });
            }, { rootMargin: '50px' });
            document.querySelectorAll('.mini-map.loading').forEach(el => observer.observe(el));
        }

        function initMiniMap(el) {
            const lat = parseFloat(el.dataset.lat), lng = parseFloat(el.dataset.lng);
            if (!lat || !lng) return;
            el.classList.remove('loading');
            try {
                const map = L.map(el, { center: [lat, lng], zoom: 13, zoomControl: false, attributionControl: false, dragging: false, scrollWheelZoom: false, doubleClickZoom: false });
                L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
                    maxZoom: 18,
                    subdomains: '1234'
                }).addTo(map);
                L.marker([lat, lng]).addTo(map);
                miniMapInstances.set(el.id, map);
            } catch (e) { console.error('地图失败:', e); }
        }

        function initFullMap() {
            if (fullMap) {
                setTimeout(() => fullMap.invalidateSize(), 100);
                updateFullMapMarkers();
                return;
            }
            fullMap = L.map('fullMap', { zoomControl: false, attributionControl: false });
            L.tileLayer('https://webrd0{s}.is.autonavi.com/appmaptile?lang=zh_cn&size=1&scale=1&style=8&x={x}&y={y}&z={z}', {
                maxZoom: 18,
                subdomains: '1234'
            }).addTo(fullMap);
            L.control.zoom({ position: 'bottomright' }).addTo(fullMap);
            updateFullMapMarkers();
        }

        function updateFullMapMarkers() {
            if (!fullMap) return;
            fullMap.eachLayer(layer => { if (layer instanceof L.Marker || layer instanceof L.CircleMarker) fullMap.removeLayer(layer); });
            const memoriesWithLocation = allMemories.filter(m => m.lat && m.lng);
            if (memoriesWithLocation.length === 0) {
                fullMap.setView([39.9042, 116.4074], 4);
                return;
            }
            const markers = [];
            memoriesWithLocation.forEach(m => {
                const marker = L.circleMarker([m.lat, m.lng], {
                    radius: 8, fillColor: '#6366f1', color: '#8b5cf6', weight: 2, opacity: 1, fillOpacity: 0.8
                }).addTo(fullMap);
                const date = new Date(m.datetime).toLocaleDateString('zh-CN');
                const time = new Date(m.datetime).toLocaleTimeString('zh-CN', { hour: '2-digit', minute: '2-digit' });
                marker.bindPopup(`<div class="memory-popup"><h4>${escapeHtml(m.location)}</h4><p>${escapeHtml(m.content?.substring(0, 50) || '')}${m.content?.length > 50 ? '...' : ''}</p><div class="time">${date} ${time}</div></div>`);
                markers.push(marker);
            });
            const group = new L.featureGroup(markers);
            fullMap.fitBounds(group.getBounds().pad(0.1));
        }

        function fitMapBounds() {
            if (!fullMap) return;
            const memoriesWithLocation = allMemories.filter(m => m.lat && m.lng);
            if (memoriesWithLocation.length === 0) return;
            const markers = [];
            memoriesWithLocation.forEach(m => markers.push(L.marker([m.lat, m.lng])));
            const group = new L.featureGroup(markers);
            fullMap.fitBounds(group.getBounds().pad(0.1));
        }

            navigator.geolocation.getCurrentPosition(

                        fullMap.setView([pos.coords.latitude, pos.coords.longitude], 15);

        function updateMapStats() {
            const withLocation = allMemories.filter(m => m.lat && m.lng);

            document.getElementById('mapStatTotal').textContent = allMemories.length;

        function renderStatsView() {
            if (allMemories.length === 0) return;
            const withLocation = allMemories.filter(m => m.lat && m.lng).length;
            const withImage = allMemories.filter(m => m.image).length;
            const withTags = allMemories.filter(m => m.tags?.length > 0).length;
            const uniqueLocations = new Set(allMemories.filter(m => m.location).map(m => m.location)).size;

            document.getElementById('statTotal').textContent = allMemories.length;
            document.getElementById('statLocations').textContent = uniqueLocations;
            document.getElementById('statWithLocation').textContent = withLocation;
            document.getElementById('statWithImage').textContent = withImage;
            document.getElementById('statWithTags').textContent = withTags;

            document.getElementById('progressLocation').style.width = (withLocation / allMemories.length * 100) + '%';
            document.getElementById('progressImage').style.width = (withImage / allMemories.length * 100) + '%';
            document.getElementById('progressTags').style.width = (withTags / allMemories.length * 100) + '%';

            const tagCounts = {};
            allMemories.forEach(m => {
                if (m.tags) m.tags.forEach(t => tagCounts[t] = (tagCounts[t] || 0) + 1);
            });
            const sortedTags = Object.entries(tagCounts).sort((a, b) => b[1] - a[1]);
            const tagsContainer = document.getElementById('tagsList');
            if (sortedTags.length > 0) {
                tagsContainer.innerHTML = sortedTags.map(([tag, count]) => `
                    <div class="flex items-center justify-between p-2 rounded-lg bg-white/5">
                        <div class="flex items-center gap-2"><span class="w-2 h-2 rounded-full bg-indigo-400"></span><span class="text-sm">${escapeHtml(tag)}</span></div>
                        <span class="text-sm text-white/60">${count}</span>
                    </div>`).join('');
            }

            const hours = { morning: 0, afternoon: 0, evening: 0, night: 0 };
            allMemories.forEach(m => {
                const h = new Date(m.datetime).getHours();
                if (h >= 6 && h < 12) hours.morning++;
                else if (h >= 12 && h < 18) hours.afternoon++;
                else if (h >= 18 && h < 22) hours.evening++;
                else hours.night++;
            });
            document.getElementById('statMorning').textContent = hours.morning;
            document.getElementById('statAfternoon').textContent = hours.afternoon;
            document.getElementById('statEvening').textContent = hours.evening;
            document.getElementById('statNight').textContent = hours.night;

            renderTrendChart();
        }

        function renderTrendChart() {
            const ctx = document.getElementById('trendChart');
            if (!ctx) return;
            const dateCounts = {};
            const dates = [];
            for (let i = 29; i >= 0; i--) {
                const d = new Date(); d.setDate(d.getDate() - i);
                const key = d.toISOString().slice(0, 10);
                dates.push(key);
                dateCounts[key] = 0;
            }
            allMemories.forEach(m => {
                const key = m.datetime?.slice(0, 10);
                if (key && dateCounts.hasOwnProperty(key)) dateCounts[key]++;
            });

            if (trendChart) trendChart.destroy();

            trendChart = new Chart(ctx, {
                type: 'line',
                data: {
                    labels: dates.map(d => d.slice(5)),
                    datasets: [{
                        label: '记录数',
                        data: dates.map(d => dateCounts[d]),
                        borderColor: '#6366f1', backgroundColor: 'rgba(99, 102, 241, 0.1)',
                        borderWidth: 2, fill: true, tension: 0.4, pointRadius: 2, pointBackgroundColor: '#6366f1'
                    }]
                },
                options: {
                    responsive: true, maintainAspectRatio: false,
                    plugins: { legend: { display: false } },
                    scales: {
                        x: { display: true, grid: { display: false }, ticks: { color: 'rgba(255,255,255,0.5)', font: { size: 10 }, maxTicksLimit: 6 } },
                        y: { display: true, grid: { color: 'rgba(255,255,255,0.05)' }, ticks: { color: 'rgba(255,255,255,0.5)', font: { size: 10 }, stepSize: 1 } }
                    }
                }
            });
        }

        function escapeHtml(text) { if (!text) return ''; const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }
        function groupByDate(data) { const g = {}; data.forEach(item => { const d = new Date(item.datetime); const key = d.toLocaleDateString('zh-CN', { month: 'short', day: 'numeric', weekday: 'short' }); if (!g[key]) g[key] = []; g[key].push(item); }); return g; }
        function filterData(data, filter) { const now = new Date(); switch(filter) { case 'today': return data.filter(m => new Date(m.datetime).toDateString() === now.toDateString()); case 'week': return data.filter(m => new Date(m.datetime) >= new Date(now - 7 * 24 * 60 * 60 * 1000)); case 'travel': return data.filter(m => m.tags?.includes('旅行')); case 'work': return data.filter(m => m.tags?.includes('工作')); default: return data; } }
        function filterMemories(type) { currentFilter = type; currentPage = 0; document.querySelectorAll('.filter-btn').forEach(btn => { if (btn.dataset.filter === type) { btn.classList.remove('bg-white/5', 'text-white/70', 'border-white/10'); btn.classList.add('bg-white/20', 'text-white', 'border-white/20'); } else { btn.classList.add('bg-white/5', 'text-white/70', 'border-white/10'); btn.classList.remove('bg-white/20', 'text-white', 'border-white/20'); } }); renderPagedMemories(); }

        async function autoFillAll() { setCurrentTime(); await getCurrentLocation(); generateNearbyContext(); showToast('已填充'); }
        function setCurrentTime() { const now = new Date(); now.setMinutes(now.getMinutes() - now.getTimezoneOffset()); document.getElementById('input-time').value = now.toISOString().slice(0, 16); document.getElementById('btn-time').textContent = now.toLocaleString('zh-CN', { hour: '2-digit', minute: '2-digit' }); }
        
        let lastPosition = null;
        let lastPositionTime = 0;
        async function getCurrentLocation() { 
            const btn = document.getElementById('btn-location'); 
            btn.textContent = '定位中...'; 
            if (lastPosition && Date.now() - lastPositionTime < 300000) {
                fillPosition(lastPosition);
                btn.textContent = '已定位(缓存)';
                return;
            }
            if (!navigator.geolocation) { btn.textContent = '不支持'; return; } 
            navigator.geolocation.getCurrentPosition(
                async (pos) => { 
                    lastPosition = pos;
                    lastPositionTime = Date.now();
                    await fillPosition(pos);
                    btn.textContent = '已定位';
                }, 
                () => { 
                    btn.textContent = '失败'; 
                    showToast('定位失败，请手动输入位置'); 
                },

            );

            document.getElementById('input-lat').value = lat; 
            document.getElementById('input-lng').value = lng;

        async function handleFileSelect(event) {
            console.log('文件选择触发', event);
            const file = event.target.files[0];
            if (!file) { console.log('没有选择文件'); return; }
            console.log('选择的文件:', file.name, file.size);

        function compressImage(base64, maxWidth = 1200, quality = 0.8) {
            return new Promise((resolve) => {
                const img = new Image();
                img.onload = function() {
                    let width = img.width, height = img.height;
                    if (width > maxWidth) { height = (height * maxWidth) / width; width = maxWidth; }
                    const canvas = document.createElement('canvas');
                    canvas.width = width; canvas.height = height;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#000'; ctx.fillRect(0, 0, width, height);
                    ctx.drawImage(img, 0, 0, width, height);
                    resolve(canvas.toDataURL('image/jpeg', quality));
                };
                img.src = base64;
            });
        }

        let isSaving = false;
        async function saveMemory() {
            if (isSaving) return;
            const location = document.getElementById('input-location').value.trim();
            const content = document.getElementById('input-content').value.trim();
            if (!location || !content) return showToast('请填写必填项');
            isSaving = true;
            const btn = document.getElementById('saveBtn');
            btn.textContent = '保存中...'; btn.disabled = true;
            let imageUrl = uploadedImageBase64 || document.getElementById('input-image').value.trim() || '';
            console.log('保存记忆，图片长度:', imageUrl ? imageUrl.length : 0);
            if (imageUrl && imageUrl.length > 2 * 1024 * 1024) { showToast('图片太大，保存可能失败'); }
            try {
                const body = JSON.stringify({ 
                    location, lat: document.getElementById('input-lat').value || null, lng: document.getElementById('input-lng').value || null, 
                    datetime: document.getElementById('input-time').value, tags: selectedTags, nearby: document.getElementById('input-nearby').value || '', 
                    content, image: imageUrl 
                });
                console.log('请求体大小:', Math.round(body.length / 1024), 'KB');
                const res = await fetch(`${API_BASE}/api/memories`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: body
                });
                if (!res.ok) throw new Error(`HTTP ${res.status}: ${res.statusText}`);
                const data = await res.json();
                if (data.success) { closeQuickAdd(); await loadMemories(); showToast('已保存'); } 
                else { showToast('保存失败: ' + (data.error || '未知错误')); btn.textContent = '保存'; btn.disabled = false; }
            } catch (err) { 
                console.error('保存错误:', err);
                showToast('保存失败: ' + err.message); 
                btn.textContent = '保存'; btn.disabled = false; 
            } finally { isSaving = false; }
        }

        function showLoading(show) { const container = document.getElementById('memoriesList'); if (show) container.innerHTML = '<div class="loading-dots"><span></span><span></span><span></span></div>'; }
        function updateStats(total) { const locCount = new Set(allMemories.filter(m => m.location).map(m => m.location)).size; document.getElementById('header-stats').textContent = `${total || allMemories.length} 段记忆 · ${locCount} 个地点`; }
        function showToast(msg) { const existing = document.querySelector('.toast-message'); if (existing) existing.remove(); const toast = document.createElement('div'); toast.className = 'toast-message'; toast.textContent = msg; document.body.appendChild(toast); setTimeout(() => toast.remove(), 2000); }
    </script>
</body>
</html>
